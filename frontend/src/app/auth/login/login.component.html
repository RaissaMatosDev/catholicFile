<div class="auth-page">

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="cross-bg"></div>

  <div class="auth-card">

    <div class="brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="12" y="2" width="4" height="24" rx="2" fill="white"/>
          <rect x="4" y="8" width="20" height="4" rx="2" fill="white"/>
        </svg>
      </div>
      <span class="brand-name"><strong>Catholic</strong>File</span>
    </div>

    <h1 class="auth-title">Bem-vindo de volta</h1>
    <p class="auth-sub">Acesse sua conta para continuar</p>

    <div class="alert-erro" *ngIf="erro">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 5v3M8 10.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      {{ erro }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <div class="field" [class.field--error]="email.invalid && email.touched">
        <label for="email">E-mail</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/>
            <path d="M1 5l7 5 7-5" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="seu@email.com"
            autocomplete="email"
          />
        </div>
        <span class="field-msg" *ngIf="email.invalid && email.touched">
          {{ email.errors?.['required'] ? 'E-mail obrigatório.' : 'E-mail inválido.' }}
        </span>
      </div>

      <div class="field" [class.field--error]="senha.invalid && senha.touched">
        <label for="senha">Senha</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
            <path d="M5 7V5a3 3 0 116 0v2" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <input
            id="senha"
            [type]="mostrarSenha ? 'text' : 'password'"
            formControlName="senha"
            placeholder="Mínimo 6 caracteres"
            autocomplete="current-password"
          />
          <button type="button" class="toggle-senha" (click)="mostrarSenha = !mostrarSenha">
            <svg *ngIf="!mostrarSenha" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.2"/>
              <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/>
            </svg>
            <svg *ngIf="mostrarSenha" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M2 2l12 12M6.5 6.6A2 2 0 0010.4 10M4.2 4.3C2.8 5.3 1.5 6.8 1 8c1 2.5 3.8 5 7 5a7.5 7.5 0 003.8-1M6 3.2A7 7 0 0115 8c-.3.8-.9 1.7-1.6 2.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <span class="field-msg" *ngIf="senha.invalid && senha.touched">
          {{ senha.errors?.['required'] ? 'Senha obrigatória.' : 'Mínimo 6 caracteres.' }}
        </span>
      </div>

      <button class="btn-primary" type="submit" [disabled]="loading">
        <span class="btn-text" *ngIf="!loading">Entrar</span>
        <span class="btn-loader" *ngIf="loading">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" class="spin">
            <circle cx="9" cy="9" r="7" stroke="white" stroke-width="2" stroke-dasharray="32" stroke-dashoffset="10"/>
          </svg>
        </span>
      </button>

    </form>

    <p class="auth-footer">
      Não tem conta?
      <a routerLink="/cadastro">Criar conta</a>
    </p>

  </div>
</div>
