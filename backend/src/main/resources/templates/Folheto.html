<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"/>

    <style>

        @page {
            size: A4;
            margin: 1cm;
        }

        body{
            font-family: "Times New Roman", serif;
            font-size: 14px;
            line-height: 1.4;
        }

        /* título do folheto */

        .titulo{
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* container das duas colunas */

        .colunas{
            column-count: 2;
            column-gap: 1cm;
        }

        /* cada seção */

        .secao{
            margin-bottom: 14px;
            page-break-inside: avoid;
            break-inside: avoid;
        }

        /* título da seção */

        .tipo{
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }

        /* texto */

        .conteudo{
            white-space: pre-line;
            text-align: justify;
        }

    </style>
</head>

<body>

<div class="titulo" th:text="${folheto.titulo}">

</div>

<div class="colunas">

    <div th:each="secao : ${folheto.secoes}" class="secao">

        <div class="tipo"
             th:text="${#strings.replace(secao.tipo,'_',' ')}">
            Tipo da seção
        </div>

        <div class="conteudo"
             th:text="${secao.conteudo}">
            Conteúdo
        </div>

    </div>

</div>

</body>
</html>
